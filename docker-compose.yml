services:
  tcb-monitor:
    build: .
    container_name: tcb-monitor
    ports:
      - "5003:5001"
    volumes:
      - ./history.db:/app/history.db
    environment:
      SESSION_SECRET: ${SESSION_SECRET:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    restart: unless-stopped
